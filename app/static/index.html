<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Company Data Assistant</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; }
    textarea { width: 100%; height: 90px; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    #sql { background: #f7f7f7; padding: .5rem; font-family: ui-monospace, SFMono-Regular, monospace; display:none; white-space: pre-wrap; }
    .row { display:flex; gap:.5rem; align-items:center; margin:.5rem 0; }
    button { padding:.5rem .8rem; }
    select { padding:.3rem; }
  </style>
</head>
<body>
  <h2>Company Data Assistant</h2>

  <div class="row">
    <select id="dataset">
      <option value="clients">Client & Contacts</option>
      <option value="consultants">Consultants</option>
      <option value="engagements">Engagements</option>
    </select>
    <label><input type="checkbox" id="showSql"> Show SQL</label>
    <button id="download" disabled>Download CSV</button>
  </div>

  <textarea id="q" placeholder="e.g., Show the first 20 contacts at AIG"></textarea>
  <div class="row">
    <button id="ask">Ask</button>
    <small id="status" aria-live="polite"></small>
  </div>

  <pre id="sql"></pre>
  <div id="out"></div>

    <script>
    const askBtn = document.getElementById('ask');
    const showSql = document.getElementById('showSql');
    const sqlEl = document.getElementById('sql');
    const out = document.getElementById('out');
    const statusEl = document.getElementById('status');
    const dl = document.getElementById('download');
    const datasetEl = document.getElementById('dataset');
    const qEl = document.getElementById('q');

    showSql.addEventListener('change', ()=> sqlEl.style.display = showSql.checked ? 'block' : 'none');

    function toCSV(cols, rows){
      const esc = s => `"${String(s ?? "").replaceAll('"','""')}"`;
      const head = cols.map(esc).join(',');
      const body = rows.map(r => cols.map(c => esc(r[c])).join(',')).join('\n');
      return head + '\n' + body;
    }

    askBtn.onclick = async () => {
      statusEl.textContent = 'Thinking...';
      out.textContent = '';
      sqlEl.textContent = '';
      dl.disabled = true;

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ question: qEl.value, dataset: datasetEl.value })
        });
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || 'Request failed');
        }

        statusEl.textContent = 'Done';
        // Show SQL if toggled
        sqlEl.textContent = data.sql || '';

        const cols = data.columns || [];
        const rows = data.rows || [];
        if (!rows.length) { out.textContent = 'No results.'; return; }

        // Render table
        out.innerHTML = '<table><thead><tr>' + cols.map(c=>`<th>${c}</th>`).join('') +
          '</tr></thead><tbody>' +
          rows.map(r=>'<tr>'+cols.map(c=>`<td>${r[c] ?? ''}</td>`).join('')+'</tr>').join('') +
          '</tbody></table>';

        // Enable CSV
        dl.disabled = false;
        dl.onclick = () => {
          const csv = toCSV(cols, rows);
          const a = document.createElement('a');
          a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
          a.download = 'results.csv';
          a.click();
        };
      } catch (e) {
        statusEl.textContent = 'Error';
        out.textContent = e.message || String(e);
      }
    };
  </script>

</body>
</html>
