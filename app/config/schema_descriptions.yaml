  ClientEngagement:
    columns:
      engagement_id:
        type: uuid
        semantic_type: id
        preferred_filter: '='
        notes: primary key
        description: Unique identifier for each client engagement record.
      project_name:
        type: text
        semantic_type: text
        preferred_filter: ilike
        sample_values: [Real Estate 2025 - AIG, Vendor Control Tower - PS, S&OP Optimization - MAESA, ITSM Assessment - MHE]
        description: Name of the client project or initiative.
      client_id:
        type: uuid
        semantic_type: id
        preferred_filter: '='
        notes: FK -> ClientList.client_id
        description: Unique identifier for the client associated with the engagement.
      problem:
        type: text
        semantic_type: text
        preferred_filter: ilike
        sample_values: ['Global insurance company’s real estate portfolio was shaped by reactive, siloed decision-making,
            resulting in a footprint that was misaligned with business needs

            The company needed to establish a unified portfolio strategy aligned with business and HR priorities to reshape
            their footprint around future business needs and culture to unlock long-term value', "Private Equity owned Education\
            \ Publisher was experiencing above average IT Service Management costs for its scale and was considering non-renewal\
            \ of an outsourcing partner contract \nMandate included an assessment of ITSM processes, recommendations for improvement,\
            \ action to take regarding outsourcing partner", 'A PE-owned healthcare services firm faced margin losses from
            poor visibility into vendor coverage and capabilities, leading to inefficient service decisions

            The firm required a centralized vendor portal and process to improve operational decision-making, and accelerate
            their tech transformation.', 'PE-owned beauty brand incubator experienced rapid growth over the last several years,
            and faced poor service levels and high inventory due to inadequate processes and controls to support this growth

            The company needed help to implement process controls, optimize their inventory, and bring visibility to operations
            to rapidly triage working capital']
        description: Description of the client's business challenge or issue addressed by the engagement.
      approach:
        type: text
        semantic_type: text
        preferred_filter: ilike
        sample_values: ["Baselined critical current-state supply chain processes identifying key optimization opportunities\n\
            Highlighted major data gaps to address and aligned on critical details required by operational teams to ensure\
            \ success\nDeveloped, socialized, and deployed multiple PowerBI toolsets to enhance visibility into inventory\
            \ levels and performance KPIs \nImplemented responsibility matrix to ensure sustainability\nDemonstrated use of\
            \ tools to drive improved immediate decision-making", "Analyzed real estate asset portfolio to baseline footprint,\
            \ costs, and utilization\nBuilt a data-driven, scenario-based model utilizing holistic evaluation criteria to\
            \ assess sites and identify opportunities for value creation\nAligned business unit leads and corporate stakeholders\
            \ to ensure strategic coherence\nDelivered executive-level briefings and prioritized real estate action plan \n\
            Created detailed financial business cases and tactical execution roadmaps of proposed real estate actions", 'Evaluated
            outsourcing partner’s contributions through internal benchmarking and cost modeling which identified their limited
            value for cost

            Assessed company’s hardware and software asset management processes

            Utilized process mining of ServiceNow data to identify Service Desk inefficiencies and bottlenecks

            Created empirical end user profiles by function and management level for software and hardware assets based on
            current installed base', 'Rapidly assessed current state data, defining core data architecture, data flows, and
            new objects as needed

            Established a central Vendor Data Lake

            Developed SSA Control Tower to support Vendor Operations team

            Defined KPIs aligned to broader business goals

            Identified considerations for upcoming Salesforce migration, ensuring sustainability of new capabilities

            Developed SOPs and review cadences to define usage of the Control Tower and drive master data remediation']
        description: Summary of the methods and strategies used to address the client's problem.
      milestones_activities:
        type: text
        semantic_type: text
        preferred_filter: ilike
        description: Key milestones and activities completed during the engagement.
      deliverables:
        type: text
        semantic_type: text
        preferred_filter: ilike
        description: Specific outputs or products delivered to the client as part of the engagement.
      recurring_impact_annual:
        type: numeric
        semantic_type: numeric
        preferred_filter: between
        notes: annual recurring impact (USD)
        description: Estimated annual recurring financial impact or savings resulting from the engagement.
      one_time_impact:
        type: numeric
        semantic_type: numeric
        preferred_filter: between
        notes: one-time impact (USD)
        description: Estimated one-time financial impact or savings achieved through the engagement.
      outcomes_impact:
        type: text
        semantic_type: text
        preferred_filter: ilike
        sample_values: ["Saved 30% of outsource costs through insourcing recommendation\n\nIdentified software asset management\
            \ inefficiencies leading to 15% cost reduction opportunity \n\nDetermined potential for 10% reduction in service\
            \ desk labor through redesign of non-employee lifecycle management", 'Deployed SSA Control Tower, increasing Vendor
            Operations capacity by 30%


            Enabled asset-level visibility to negotiated vs actual costs, enabling a 20% reduction in Preventive Maintenance
            costs


            Developed and operationalized new KPIs, creating a foundation for ongoing vendor performance management and continuous
            improvement


            Enabled tech transformation via formal governance, SOPs, and data  remediation routines', 'Identified 18% total
            annual occupancy cost savings across leased assets


            Outlined opportunity to reduce 14% of portfolio assets tied to near-term lease expirations


            Established path to eliminate 25% excess seat capacity through densification, relocation, and exit strategies


            Delivered business-aligned real estate strategy and modeling tool for repeatable scenario-based future decision
            making', 'Increased Fill Rate from 50% to >90% by delivering tailored supply planning toolsets and processes


            Mitigated Gross Margin variance of 16% with key distribution partner via improved controls


            Established Demand Forecasting Accuracy measurement tool, emphasizing need for a more robust SIOP process


            Developed Consolidated Corporate Scorecard to ensure tighter controls around data quality and governance']
        description: Summary of measurable business outcomes and benefits realized from the engagement.
      notes:
        type: text
        semantic_type: text
        preferred_filter: ilike
        description: Additional remarks or contextual information related to the engagement.
      case_study:
        type: text
        semantic_type: text
        preferred_filter: ilike
        notes: free-form flag/summary
        description: Detailed narrative or documentation highlighting the engagement as a case study.
      start_date:
        type: date
        semantic_type: date
        preferred_filter: between
        notes: expects YYYY-MM-DD
        description: Date when the engagement officially began.
      status:
        type: text
        semantic_type: categorical
        preferred_filter: ilike
        notes: see allowed engagement statuses
        sample_values: [Completed]
        description: Current state or progress of the engagement (e.g., Completed).
      end_date:
        type: date
        semantic_type: date
        preferred_filter: between
        notes: expects YYYY-MM-DD
        description: Date when the engagement was completed or closed.
      capex_baseline:
        type: numeric
        semantic_type: numeric
        preferred_filter: between
        notes: baseline capital expenditure (USD)
        description: Baseline capital expenditure related to the engagement before project execution.
      current_spend_baseline:
        type: numeric
        semantic_type: numeric
        preferred_filter: between
        notes: baseline current spend (USD)
        description: Baseline operational or current spending level before the engagement.
    description: This table captures detailed information about client engagements, including project scope, approach, outcomes,
      and financial impacts to support business decision-making and performance tracking.
